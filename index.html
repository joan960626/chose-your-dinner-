<div id="Container">

    <h1>我的地圖網站</h1>

  <div id="Intro" class="Hidden">

      <h1>
        歡迎來到食物地圖

      <p class="Highlighttext">

>

        class="Areadropdown Hidden"

            type="checkbox"
            value="all"
            checked
          >

        </label>
      </div>
    </div>

    <div class="Selectwrapper">
      <button
        id="KindTogglebtn"
        class="Areaselect"
        type="button"

      </button>

      <div
        id="Kindfilter"
        class="Areadropdown Hidden"

    <button
      id="Golotterybtn"
      type="button"
    >
      🎲 今天晚餐吃什麼?

    <button
      id="Showfavoritesbtn"
      type="button"
    >

      id="Resetmapbtn"
      type="button"
